# rKNX Daemon Configuration File Example
# Place this file at /etc/rknx/config.toml
#
# NOTE: Defining any section header (such as [server], [client], [router], [usb], or [tpuart])
# tells the daemon to instantiate and run that specific service/interface. Commenting out or
# omitting a section prevents that service from being initialized.

# =====================================================================
# Configuration for KNXnet/IP Server (Routing & Tunneling Gateway)
# =====================================================================
[server]
# [Optional] Multicast routing IP address (default: "224.0.23.12")
ip = "224.0.23.12"

# [Optional] Standard KNXnet/IP port (default: 3671)
port = 3671

# [Optional] Local network interface IP to bind to (default: "0.0.0.0" for all interfaces)
local_ip = "0.0.0.0"

# [Required] Individual Physical Address (IA) assigned to the Server/Gateway
individual_address = "1.1.0"

# [Optional] Friendly name visible to KNX commissioning tools like ETS (default: "rKNX Server")
friendly_name = "rKNX Server Gateway"

# [Optional] MAC address of the host machine (default: "00:11:22:33:44:55")
mac_address = "00:11:22:33:44:55"

# [Optional] Pacing delay for routing multicast telegrams in milliseconds (default: 10)
routing_delay = 10

# [Optional] Client IP address range start and max connection capacity
# Format: "start_address:max_connections" (default: "1.1.1:15")
client_addrs = "1.1.1:15"

# [Optional] Enable routing packets over multicast (default: true)
is_routing = true

# [Optional] Bind to all active interfaces instead of just the primary one (default: false)
use_all_interfaces = false

# [Optional] Max pending request messages allowed per second per client (default: 100). Set to less than 1 to disable rate limit.
max_pending_requests_per_client = 100

# =====================================================================
# Configuration for KNXnet/IP Tunneling Client (Connects to an external Gateway)
# =====================================================================
[client]
# [Required] Remote KNXnet/IP gateway IP address
gateway_host = "192.168.1.10"

# [Optional] Remote KNXnet/IP gateway port (default: 3671)
gateway_port = 3671

# [Optional] Local binding IP address (leave blank/commented for automatic selection)
# local_ip = "0.0.0.0"

# [Optional] Local binding port (default: 0 for dynamic port allocation)
local_port = 0

# [Optional] Network transport protocol to use: "Udp" or "Tcp" (default: "Udp")
transport = "Udp"

# [Optional] Connection channel type: "TunnelConnection" or "DeviceMgmtConnection" (default: "TunnelConnection")
connection_type = "TunnelConnection"

# [Optional] Enable NAT traversal / NAT route-back mode (default: false)
use_route_back = false

# [Optional] Outgoing message transmission queue size (default: 100)
max_queue_size = 100

# [Optional] Auto-reconnect on connection loss (default: true)
auto_reconnect = true

# [Optional] Maximum reconnection retry attempts (default: 10)
max_reconnect_attempts = 10

# [Optional] Milliseconds to wait between reconnection attempts (default: 5000)
reconnect_delay_ms = 5000

# =====================================================================
# Configuration for KNXnet/IP Router Interface (Optional)
# =====================================================================
[router]
# [TODO] There are missing options for the links that the router instantiates.
# [Required] Individual Physical Address (IA) assigned to the Router
individual_address = "1.0.2"

# [Optional] Enable single individual address mode (default: false)
use_single_ia = false

# [Optional] Handle and validate routing hop count (default: false)
handle_hop_count = false

# =====================================================================
# Configuration for KNX USB Interface (Optional)
# =====================================================================
[usb]
# [Optional] Serial/device path of the USB device (e.g. "/dev/hidraw0")
# path = "/dev/hidraw0"

# [Optional] USB device vendor ID (default: MDT, Siemens, Zennio autodetect if not set)
vendor_id = 10434  # Decimal for Zennio (0x28c2)

# [Optional] USB device product ID
product_id = 1

# [Required] Individual Physical Address (IA) assigned to the USB connection
individual_address = "1.0.3"

# =====================================================================
# Configuration for KNX TPUART Serial Interface (Optional)
# =====================================================================
[tpuart]
# [Required] Path to the serial device interface
path = "/dev/ttyAMA0"

# [Optional] Auto positive ACK group address telegrams (default: false)
ack_group = false

# [Optional] Auto positive ACK individual address telegrams (default: false)
ack_individual = false

# [Required] Individual Physical Address (IA) assigned to the TPUART connection
individual_address = "1.0.4"

# =====================================================================
# Logging Configuration
# =====================================================================
[logging]
# [Optional] Print logger output detail level: "error", "warn", "info", "debug", "trace" (default: "info")
level = "info"
