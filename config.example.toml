# rKNX Daemon Configuration Example
# Place this file at /etc/rknx/config.toml

[server]
# Port to listen on for incoming KNXnet/IP connections
port = 3671
# Interface IP address (0.0.0.0 for all interfaces)
host = "0.0.0.0"

[client]
# Target KNX net IP gateway address if connecting to one
gateway_host = "192.168.1.10"
gateway_port = 3671

[logging]
level = "info"
